services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: neuco
      POSTGRES_PASSWORD: neuco
      POSTGRES_DB: neuco
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-nango-db.sql:/docker-entrypoint-initdb.d/init-nango-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuco -d neuco"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nango-server:
    image: nangohq/nango-server:hosted
    ports:
      - "3003:8080"
    environment:
      - NANGO_DB_HOST=postgres
      - NANGO_DB_PORT=5432
      - NANGO_DB_USER=neuco
      - NANGO_DB_PASSWORD=neuco
      - NANGO_DB_NAME=nango
      - NANGO_DB_SSL=false
      - NANGO_REDIS_URL=redis://redis:6379
      - NANGO_SERVER_URL=http://localhost:3003
      - NANGO_PUBLIC_SERVER_URL=http://localhost:3003
      - NANGO_ENCRYPTION_KEY=K6G52/D0FIA+awINklnD+L8zOvWFpKobAWJ6gWNRQKc=
      - FLAG_AUTH_ENABLED=false
      - FLAG_SERVE_CONNECT_UI=true
      - NANGO_DASHBOARD_USERNAME=admin
      - NANGO_DASHBOARD_PASSWORD=admin
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  neuco-api:
    build:
      context: .
      target: server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://neuco:neuco@postgres:5432/neuco?sslmode=disable
      - JWT_SECRET=dev-jwt-secret-change-me
      - INTERNAL_API_TOKEN=dev-internal-token
      - FRONTEND_URL=http://localhost:5173
      - NANGO_SERVER_URL=http://nango-server:8080
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  neuco-worker:
    build:
      context: .
      target: worker
    environment:
      - DATABASE_URL=postgres://neuco:neuco@postgres:5432/neuco?sslmode=disable
      - JWT_SECRET=dev-jwt-secret-change-me
      - INTERNAL_API_TOKEN=dev-internal-token
      - NANGO_SERVER_URL=http://nango-server:8080
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
