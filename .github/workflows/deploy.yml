name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-migrations:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations on production DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: migrate -path migrations -database "$DATABASE_URL" up

  deploy-backend:
    runs-on: ubuntu-latest
    needs: run-migrations
    if: github.event.workflow_run.conclusion == 'success'

    strategy:
      matrix:
        include:
          - app: neuco-api
            config: fly.api.toml
          - app: neuco-worker
            config: fly.worker.toml

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.app }} to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config ${{ matrix.config }} --remote-only

  # Frontend deploys automatically via Vercel Git integration — no action needed
