name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neuco
          POSTGRES_PASSWORD: neuco
          POSTGRES_DB: neuco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations
        env:
          DATABASE_URL: postgres://neuco:neuco@localhost:5432/neuco_test?sslmode=disable
        run: migrate -path migrations -database "$DATABASE_URL" up

      - name: Run tests
        env:
          DATABASE_URL: postgres://neuco:neuco@localhost:5432/neuco_test?sslmode=disable
        run: go test ./... -race -count=1

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          go build ./cmd/server
          go build ./cmd/worker

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neuco-web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: neuco-web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  validate-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration pairs
        run: |
          cd migrations
          errors=0
          for up_file in *.up.sql; do
            base="${up_file%.up.sql}"
            down_file="${base}.down.sql"
            if [ ! -f "$down_file" ]; then
              echo "ERROR: Missing down migration for $up_file"
              errors=$((errors + 1))
            fi
          done
          for down_file in *.down.sql; do
            base="${down_file%.down.sql}"
            up_file="${base}.up.sql"
            if [ ! -f "$up_file" ]; then
              echo "ERROR: Missing up migration for $down_file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors migration pair errors"
            exit 1
          fi
          echo "All migration pairs valid"

  docker-build-push:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-build, frontend, validate-migrations]
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        target: [server, worker]
        include:
          - target: server
            image_name: neuco-api
          - target: worker
            image_name: neuco-worker

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.image_name }}:latest
