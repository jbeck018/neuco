name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Neon branch ---
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          username: neuco_owner
          database: neuco

      # --- Migrations ---
      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations on preview DB
        run: migrate -path migrations -database "${{ steps.neon.outputs.db_url_with_pooler }}" up

      # --- Fly.io preview app ---
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create or update Fly preview app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          APP_NAME="neuco-api-pr-${{ github.event.pull_request.number }}"

          # Create app if it doesn't exist
          if ! flyctl apps list | grep -q "$APP_NAME"; then
            flyctl apps create "$APP_NAME" --org personal
          fi

          # Set secrets on the preview app
          flyctl secrets set \
            DATABASE_URL="${{ steps.neon.outputs.db_url_with_pooler }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            GITHUB_OAUTH_CLIENT_ID="${{ secrets.GH_OAUTH_CLIENT_ID }}" \
            GITHUB_OAUTH_CLIENT_SECRET="${{ secrets.GH_OAUTH_CLIENT_SECRET }}" \
            JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            INTERNAL_API_TOKEN="${{ secrets.INTERNAL_API_TOKEN }}" \
            NANGO_SERVER_URL="${{ secrets.NANGO_SERVER_URL }}" \
            NANGO_SECRET_KEY="${{ secrets.NANGO_SECRET_KEY }}" \
            --app "$APP_NAME"

          # Deploy the server target to the preview app
          flyctl deploy \
            --config fly.api.toml \
            --app "$APP_NAME" \
            --remote-only \
            --vm-memory 256 \
            --strategy immediate

      # --- PR Comment ---
      - name: Comment on PR with preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const appName = `neuco-api-pr-${prNumber}`;
            const apiUrl = `https://${appName}.fly.dev`;

            const body = [
              `## Preview Environment`,
              ``,
              `| Service | URL |`,
              `|---------|-----|`,
              `| API | ${apiUrl} |`,
              `| Neon Branch | \`preview/pr-${prNumber}\` |`,
              ``,
              `> Preview will auto-stop when idle and auto-start on first request.`,
            ].join('\n');

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Preview Environment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
